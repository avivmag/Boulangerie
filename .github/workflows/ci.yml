name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start server and test homepage
        run: |
          npm start &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:3000/
          kill $SERVER_PID
